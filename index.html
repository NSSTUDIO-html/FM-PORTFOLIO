<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NS Portfolio</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/motion@10.16.2/dist/motion.umd.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/loaders/FontLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/geometries/TextGeometry.js"></script>

<style>
body {
  margin: 0;
  background: black;
  overflow-x: hidden;
  font-family: sans-serif;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* UI */
.glass {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
}

.project:hover {
  transform: translateY(-10px) scale(1.03);
}

/* Animations */
.fade {
  opacity: 0;
  transform: translateY(60px);
}
</style>
</head>

<body class="text-white">

<canvas id="bg"></canvas>

<!-- NAV -->
<nav class="flex justify-between p-6 fixed w-full z-10 glass">
  <h1 class="text-xl font-semibold">NS</h1>
  <div class="flex gap-6 text-gray-300">
    <span>Work</span>
    <span>About</span>
    <span>Contact</span>
  </div>
</nav>

<!-- HERO -->
<section class="h-screen flex flex-col justify-center items-center text-center px-4">
  <h1 id="heroText" class="text-5xl md:text-6xl font-bold">
    Creative Developer
  </h1>
  <p class="mt-4 text-gray-300">3D + Motion UI Portfolio</p>
</section>

<!-- PROJECTS -->
<section class="p-10">
  <h2 class="text-3xl mb-10 text-center">My Projects</h2>

  <div class="grid md:grid-cols-3 gap-10">

    <div class="project glass p-6 rounded-2xl transition fade">
      <div class="h-40 bg-gradient-to-br from-purple-500 to-blue-500 rounded-xl mb-4"></div>
      <h3 class="text-xl">UI Project 1</h3>
      <p class="text-gray-400"><a href="GAMESETUP.html">MY GAME ROOM UI</a></p>
    </div>

    <div class="project glass p-6 rounded-2xl transition fade">
      <div class="h-40 bg-gradient-to-br from-pink-500 to-purple-500 rounded-xl mb-4"></div>
      <h3 class="text-xl">UI Project 2</h3>
      <p class="text-gray-400"><a></a>Interactive MY PC UI</p>
    </div>

    <div class="project glass p-6 rounded-2xl transition fade">
      <div class="h-40 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-xl mb-4"></div>
      <h3 class="text-xl">UI Project 3</h3>
      <p class="text-gray-400"><a></a>3D Motion UI</p>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section class="p-10 text-center fade">
  <h2 class="text-3xl mb-6">Contact</h2>
  <button class="px-8 py-3 bg-white text-black rounded-xl hover:scale-110 transition">
    Get in Touch
  </button>
</section>

<footer class="text-center p-6 text-gray-400">
  © 2026 NS Portfolio
</footer>

<script>
const { animate, inView } = Motion;

// Hero animation
animate("#heroText", { opacity: [0,1], y: [-50,0] }, { duration: 1 });

// Scroll reveal
document.querySelectorAll(".fade").forEach(el => {
  inView(el, () => {
    animate(el, { opacity: [0,1], y: [60,0] });
  });
});

// THREE SCENE
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("bg") });

renderer.setSize(window.innerWidth, window.innerHeight);
camera.position.z = 8;

// LIGHTS
const light1 = new THREE.PointLight(0xff00ff, 2);
light1.position.set(5,5,5);
scene.add(light1);

const light2 = new THREE.PointLight(0x00ffff, 2);
light2.position.set(-5,-5,5);
scene.add(light2);

// 3D TEXT
const loader = new THREE.FontLoader();

loader.load(
'https://cdn.jsdelivr.net/npm/three@0.134/examples/fonts/helvetiker_regular.typeface.json',
function(font){

  const geometry = new THREE.TextGeometry('NS', {
    font: font,
    size: 1.5,
    height: 0.4,
    bevelEnabled: true,
    bevelThickness: 0.05,
    bevelSize: 0.03
  });

  geometry.center();

  const material = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    metalness: 0.8,
    roughness: 0.2,
    emissive: 0x2200ff,
    emissiveIntensity: 0.5
  });

  const textMesh = new THREE.Mesh(geometry, material);
  scene.add(textMesh);

  // PARTICLES
  const geo = new THREE.BufferGeometry();
  const positions = [];

  for(let i=0;i<1500;i++){
    positions.push((Math.random()-0.5)*20);
    positions.push((Math.random()-0.5)*20);
    positions.push((Math.random()-0.5)*20);
  }

  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));

  const mat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.05
  });

  const particles = new THREE.Points(geo, mat);
  scene.add(particles);

  function animate3D(){
    requestAnimationFrame(animate3D);

    textMesh.rotation.y += 0.01;
    particles.rotation.y += 0.0007;

    renderer.render(scene, camera);
  }
  animate3D();

  // Mouse interaction
  document.addEventListener("mousemove", (e)=>{
    const x = (e.clientX / window.innerWidth - 0.5);
    const y = (e.clientY / window.innerHeight - 0.5);

    textMesh.rotation.y += x * 0.05;
    textMesh.rotation.x += y * 0.05;
  });

});
</script>

</body>
</html>
