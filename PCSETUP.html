<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Setup Viewer</title>
    <style>
        :root { --neon: #00ffcc; --bg: #050505; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; }
        
        #canvas-container { width: 100%; height: 100%; position: absolute; }

        /* Tech HUD Overlay */
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; border: 20px solid rgba(0, 255, 204, 0.05);
            box-sizing: border-box; z-index: 5;
        }

        #ui-panel {
            position: fixed; top: 40px; right: 40px; width: 220px;
            background: rgba(0, 0, 0, 0.8); border-left: 3px solid var(--neon);
            padding: 20px; color: var(--neon); pointer-events: all;
            backdrop-filter: blur(10px); clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
        }

        .stat-row { font-size: 10px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .bar-bg { width: 100%; height: 4px; background: #222; margin-top: 5px; }
        .bar-fill { width: 75%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); }

        #loader {
            position: fixed; inset: 0; background: #000; z-index: 20;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .glitch-text { color: var(--neon); font-size: 1.5rem; letter-spacing: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        button {
            width: 100%; margin-top: 15px; background: transparent; border: 1px solid var(--neon);
            color: var(--neon); padding: 8px; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: var(--neon); color: #000; }
    </style>
</head>
<body>

<div id="loader">
    <div class="glitch-text">SYNCING HARDWARE...</div>
    <div style="width: 200px; height: 2px; background: #111; margin-top: 20px;">
        <div id="bar" style="width: 0%; height: 100%; background: var(--neon);"></div>
    </div>
</div>

<div id="hud"></div>

<div id="ui-panel">
    <div class="stat-row">System: Active</div>
    <div class="stat-row">GPU Temp: 42°C <div class="bar-bg"><div class="bar-fill"></div></div></div>
    <div class="stat-row">Fan Speed: 2400RPM <div class="bar-bg"><div class="bar-fill" style="width:40%"></div></div></div>
    <button onclick="toggleRotation()">ROTATE_VIEW</button>
</div>

<div id="canvas-container"></div>

<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    let scene, camera, renderer, model, controls, grid;
    let autoRotate = true;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x050505, 5, 15);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3, 6);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.getElementById("canvas-container").appendChild(renderer.domElement);

        // Neon Grid Floor
        grid = new THREE.GridHelper(40, 40, 0x00ffcc, 0x222222);
        grid.position.y = -1.5;
        scene.add(grid);

        // Lights
        const ambient = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambient);

        const pointLight = new THREE.PointLight(0x00ffcc, 2, 10);
        pointLight.position.set(2, 3, 2);
        scene.add(pointLight);

        // Blue/Purple Rim Lights
        const p1 = new THREE.PointLight(0xff00ff, 2, 10);
        p1.position.set(-3, 1, -2);
        scene.add(p1);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const loader = new GLTFLoader();
        loader.load(
            "",
            (gltf) => {
                model = gltf.scene;
                
                // Adjust model
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3()).length();
                model.scale.setScalar(4 / size);
                model.position.y = -1.5; // Sit on the grid

                scene.add(model);
                document.getElementById("loader").style.display = "none";
            },
            (xhr) => {
                const percent = (xhr.loaded / xhr.total) * 100;
                document.getElementById("bar").style.width = percent + "%";
            }
        );

        window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    window.toggleRotation = () => { autoRotate = !autoRotate; };

    function animate() {
        requestAnimationFrame(animate);
        
        // Slowly move grid for "infinite" feel
        if (grid) grid.position.z = (Date.now() * 0.001) % 1;

        if (model && autoRotate) model.rotation.y += 0.005;
        
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
