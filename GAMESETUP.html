<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming PC GLB Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100%; height: 100%; position: fixed; }
        
        #loader {
            position: fixed; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: #00ffff; z-index: 10;
        }

        #progress { width: 200px; height: 4px; background: #222; margin-top: 15px; border-radius: 2px; }
        #bar { height: 100%; width: 0%; background: #00ffff; transition: width 0.2s; }

        #ui { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 5; }
        button {
            padding: 10px 20px; background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff; color: #00ffff; cursor: pointer;
            backdrop-filter: blur(5px); border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="loader">
    <div id="status">INITIALIZING SYSTEMS...</div>
    <div id="progress"><div id="bar"></div></div>
</div>

<div id="ui">
    <button onclick="toggleRotation()">TOGGLE ROTATION</button>
</div>

<div id="canvas-container"></div>

<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    let scene, camera, renderer, model, controls;
    let autoRotate = true;

    init();
    animate();

    function init() {
        // 1. Scene Setup
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        // 2. Camera Setup
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2, 5);

        // 3. Renderer Setup
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        // Critical for GLB visual quality
        renderer.outputColorSpace = THREE.SRGBColorSpace; 
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;

        document.getElementById("canvas-container").appendChild(renderer.domElement);

        // 4. Lights
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        const rimLight = new THREE.PointLight(0x00ffff, 1);
        rimLight.position.set(-5, 2, -3);
        scene.add(rimLight);

        // 5. Controls (Note the different way of calling OrbitControls)
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 6. Loader
        const loader = new GLTFLoader();
        loader.load(
            "modern_desk_setup__game_ready_3d_model.glb",
            (gltf) => {
                model = gltf.scene;

                // Center the model automatically
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);

                // Auto-scale to fit view
                const size = box.getSize(new THREE.Vector3()).length();
                const scale = 4 / size; 
                model.scale.setScalar(scale);

                scene.add(model);
                document.getElementById("loader").style.display = "none";
            },
            (xhr) => {
                if (xhr.lengthComputable) {
                    const percent = (xhr.loaded / xhr.total) * 100;
                    document.getElementById("bar").style.width = percent + "%";
                }
            },
            (err) => {
                console.error(err);
                document.getElementById("status").innerText = "LOAD FAILED";
                document.getElementById("status").style.color = "red";
            }
        );

        window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Exporting function to window so the HTML button can see it
    window.toggleRotation = () => {
        autoRotate = !autoRotate;
    };

    function animate() {
        requestAnimationFrame(animate);

        if (model && autoRotate) {
            model.rotation.y += 0.005;
        }

        controls.update();
        renderer.render(scene, camera);
    }
</script>

</body>
</html>
