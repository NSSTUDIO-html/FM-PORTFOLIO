<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100K Skills Master Plan | 3D Hub</title>
    <style>
        :root { --neon: #00f2ff; --bg: #020205; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* Interactive HUD */
        #overlay {
            position: fixed; top: 20px; left: 20px; z-index: 10;
            pointer-events: none; border-left: 2px solid var(--neon); padding-left: 15px;
        }
        h1 { margin: 0; font-size: 1.2rem; letter-spacing: 3px; text-transform: uppercase; color: var(--neon); }
        p { font-size: 0.8rem; opacity: 0.7; }

        #skill-card {
            position: fixed; bottom: 30px; right: 30px; width: 280px;
            background: rgba(0, 10, 20, 0.9); border: 1px solid var(--neon);
            padding: 20px; border-radius: 8px; display: none;
            backdrop-filter: blur(10px); z-index: 15;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        #canvas-container { width: 100%; height: 100vh; cursor: crosshair; }

        .loader {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <div style="color: var(--neon); font-weight: bold; letter-spacing: 5px;">LOADING NEXUS...</div>
</div>

<div id="overlay">
    <h1>100K Skills Master Plan</h1>
    <p>Procedural 3D Domain Navigator | Created by Sasank</p>
</div>

<div id="skill-card">
    <h3 id="skill-title" style="color:var(--neon); margin-top:0;">Domain Name</h3>
    <p id="skill-desc" style="font-size: 14px; line-height: 1.4;">Description goes here...</p>
    <button onclick="closeCard()" style="background:var(--neon); border:none; width:100%; padding:5px; cursor:pointer; font-weight:bold;">CLOSE</button>
</div>

<div id="canvas-container"></div>

<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Skill Data (Short Sample from your 100 list)
    const skills = [
        { id: 1, cat: "Tech", name: "Programming", desc: "Writing code, building software and tools." },
        { id: 4, cat: "Tech", name: "AI & ML", desc: "Teaching machines to learn and make decisions." },
        { id: 7, cat: "Tech", name: "Cybersecurity", desc: "Protecting systems and data from attacks." },
        { id: 10, cat: "Tech", name: "AR & VR", desc: "Immersive digital experiences." },
        { id: 21, cat: "Science", name: "Astronomy", desc: "Stars, planets, and the universe." },
        { id: 26, cat: "Business", name: "Entrepreneurship", desc: "Starting and running businesses." },
        { id: 41, cat: "Engineering", name: "Aerospace", desc: "Aircraft and spacecraft design." },
        { id: 96, cat: "Future", name: "Quantum Computing", desc: "Next-gen super-fast computing." }
        // Note: You can add all 100 here in this format
    ];

    let scene, camera, renderer, controls, raycaster, mouse;
    const spheres = [];

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 15;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById("canvas-container").appendChild(renderer.domElement);

        // Lights
        const amb = new THREE.AmbientLight(0x404040, 2);
        scene.add(amb);
        const point = new THREE.PointLight(0x00f2ff, 2, 50);
        scene.add(point);

        // Starfield Background
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<2000; i++) {
            starPos.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
        scene.add(new THREE.Points(starGeo, starMat));

        // Create 3D Nodes for Skills
        const geometry = new THREE.IcosahedronGeometry(0.5, 2);
        
        skills.forEach((skill, index) => {
            const material = new THREE.MeshPhongMaterial({
                color: skill.cat === "Tech" ? 0x00f2ff : 0xff00ff,
                emissive: skill.cat === "Tech" ? 0x004444 : 0x440044,
                shininess: 100
            });
            const mesh = new THREE.Mesh(geometry, material);
            
            // Position in a sphere formation
            const phi = Math.acos(-1 + (2 * index) / skills.length);
            const theta = Math.sqrt(skills.length * Math.PI) * phi;
            
            mesh.position.setFromSphericalCoords(8, phi, theta);
            mesh.userData = skill; // Store skill data in the mesh
            
            scene.add(mesh);
            spheres.push(mesh);
        });

        // Interaction
        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        controls = new OrbitControls(camera, renderer.domElement);
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
        controls.enableDamping = true;

        window.addEventListener('click', onSelect);
        window.addEventListener('resize', onResize);
        
        document.getElementById("loader").style.display = "none";
    }

    function onSelect(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(spheres);

        if (intersects.length > 0) {
            const data = intersects[0].object.userData;
            showCard(data);
            
            // Focus effect
            const targetPos = intersects[0].object.position.clone().multiplyScalar(1.5);
            // In a real app, you'd use GSAP to animate the camera here
        }
    }

    function showCard(data) {
        document.getElementById("skill-title").innerText = data.name;
        document.getElementById("skill-desc").innerText = data.desc;
        document.getElementById("skill-card").style.display = "block";
    }

    window.closeCard = () => {
        document.getElementById("skill-card").style.display = "none";
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
